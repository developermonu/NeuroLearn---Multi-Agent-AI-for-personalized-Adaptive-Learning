<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NeuroLearn</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-icon">N</div>
                    <span>NeuroLearn</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" href="/dashboard.html"><span class="nav-icon">&#127968;</span> Dashboard</a>
                <a class="nav-item" href="/study.html"><span class="nav-icon">&#128214;</span> Study</a>
                <a class="nav-item" href="/quiz.html"><span class="nav-icon">&#10067;</span> Quiz</a>
                <a class="nav-item" href="/qa.html"><span class="nav-icon">&#129302;</span> AI Tutor</a>
                <a class="nav-item" href="/progress.html"><span class="nav-icon">&#128200;</span> Progress</a>
                <a class="nav-item" href="/certificate.html"><span class="nav-icon">&#127942;</span> Certificates</a>
            </nav>
            <div class="sidebar-footer">
                <div class="nav-item" onclick="logout()">
                    <span class="nav-icon">&#128682;</span>
                    <span id="user-name">User</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <div class="page-title">Dashboard</div>
                    <div class="page-subtitle">Welcome back, <span id="welcome-name">Student</span></div>
                </div>
                <div class="flex gap-3">
                    <button class="btn btn-secondary" onclick="showExamCatalog()">
                        <span>+</span> Enroll in Exam
                    </button>
                    <div style="position: relative;">
                        <button class="btn btn-ghost">&#128276;</button>
                        <span id="notification-count" class="badge badge-danger hidden" style="position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;">0</span>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div id="enrollments-container">
                    <div class="text-center" style="padding: var(--space-16);"><div class="spinner" style="margin: 0 auto;"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Exam Catalog Modal -->
    <div class="modal-overlay" id="exam-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Available Exams</div>
                <button class="modal-close" onclick="closeModal('exam-modal')">&times;</button>
            </div>
            <div class="modal-body" id="exam-list"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
